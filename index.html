<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FundOff — The Uncensorable Donation Platform</title>
  <meta name="description" content="The donation platform that can't be bullied. No judges. No freezes. No middlemen."/>
  <meta property="og:title" content="FundOff — Uncensorable Donations"/>
  <meta property="og:description" content="GoFundMe took down $454,000 overnight. That can never happen here."/>
  <meta property="og:url" content="https://fundoff.org"/>
  <meta property="og:type" content="website"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="FundOff — The Uncensorable Donation Platform"/>
  <meta name="twitter:description" content="No judges. No freezes. No middlemen. Campaigns live on the blockchain forever."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://js.stripe.com/v3/"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #09090f; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }
    input, textarea, button, select { font-family: inherit; }
    input::placeholder, textarea::placeholder { color: #333; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    .fade-in { animation: fadeIn 0.25s ease forwards; }
    .slide-up { animation: slideUp 0.4s ease forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const CONTRACT     = "0x3a6a50a4c7145896BeBe99b731Ccf6Cb0739e752";
const STRIPE_PK    = "pk_live_51ThbNgIgV5bYQ9TsT0ac5sADVMBwrgNdJ2maThtKLMLb5xVZV8Iyf8uNyqSzfJtaVzogkBs7ikTKp8A06T7kOAVs00Z7WulBto";
let _stripe = null;
const getStripe = () => { if(!_stripe && window.Stripe) _stripe = window.Stripe(STRIPE_PK); return _stripe; };
const REPORT_EMAIL = "reports@fundoff.org";
const TERMS_KEY    = "fundoff_terms_agreed_v1";
const WAITLIST_KEY = "fundoff_waitlist_joined";

const VERIFY = {
  none:   { label:null, badge:null, color:null, desc:null },
  social: { label:"Social Verified", badge:"✓", color:"#4488ff", desc:"Identity confirmed via linked social media account" },
  id:     { label:"ID Verified", badge:"🛡", color:"#22cc88", desc:"Government ID verified via Stripe Identity" },
  manual: { label:"Verified by FundOff", badge:"⭐", color:"#ff8800", desc:"Manually verified by FundOff team" },
};

const TIERS = {
  Free:  { label:"Free",  price:"$0/mo",     fee:"2%",   color:"#555",    border:"#2a2a3a", bg:"rgba(85,85,85,0.06)",   perks:["Instant launch","2% donation fee","On-chain protected","Visible in listings"] },
  Pro:   { label:"Pro",   price:"$9.99/mo",  fee:"1%",   color:"#4488ff", border:"#4488ff", bg:"rgba(68,136,255,0.07)", perks:["Featured badge","1% donation fee","Priority listing","On-chain protected"] },
  Elite: { label:"Elite", price:"$29.99/mo", fee:"0.5%", color:"#ff8800", border:"#ff8800", bg:"rgba(255,136,0,0.07)",  perks:["Homepage featured","0.5% donation fee","Top placement","Analytics","On-chain protected"] },
};

const inp        = { width:"100%", padding:"13px 14px", borderRadius:10, border:"1px solid #1e1e2e", background:"#0d0d15", color:"#fff", fontSize:15, outline:"none", boxSizing:"border-box", fontFamily:"inherit" };
const primaryBtn = (x={}) => ({ padding:"14px", borderRadius:11, border:"none", background:"linear-gradient(90deg,#ff4444,#ff8800)", color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer", width:"100%", ...x });
const ghostBtn   = (x={}) => ({ padding:"12px 22px", borderRadius:11, border:"1px solid #1e1e2e", background:"none", color:"#666", fontSize:14, cursor:"pointer", fontWeight:500, ...x });
const cardStyle  = { background:"#111118", border:"1px solid #1a1a28", borderRadius:16 };

const fmt = u => { const n=u/1e6; if(n>=1e6) return `$${(n/1e6).toFixed(1)}M`; if(n>=1000) return `$${(n/1000).toFixed(0)}k`; return `$${n.toFixed(0)}`; };
const pct = (r,g) => Math.min(100,Math.round((r/g)*100));
const ago = ts => { const d=Math.floor(Date.now()/1000-ts); if(d<3600) return `${Math.floor(d/60)}m ago`; if(d<86400) return `${Math.floor(d/3600)}h ago`; return `${Math.floor(d/86400)}d ago`; };

// ─── Waitlist Banner ──────────────────────────────────────────────────────────
function WaitlistBanner() {
  const [email, setEmail] = useState("");
  const [done, setDone] = useState(false);
  const [err, setErr] = useState("");

  useEffect(()=>{
    if(localStorage.getItem(WAITLIST_KEY)) setDone(true);
  },[]);

  const join = () => {
    if(!email||!email.includes("@")){setErr("Please enter a valid email");return;}
    // In production this hits your backend — for now stores locally + opens mailto
    localStorage.setItem(WAITLIST_KEY, email);
    const sub  = "FundOff Early Access Request";
    const body = `Email: ${email}\nJoined waitlist at: ${new Date().toISOString()}\nPage: fundoff.org`;
    window.open(`mailto:hello@fundoff.org?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`,"_blank");
    setDone(true);
  };

  return (
    <div style={{
      background:"linear-gradient(135deg,rgba(255,68,68,0.08),rgba(255,136,0,0.08))",
      border:"1px solid rgba(255,68,68,0.2)",
      borderRadius:16, padding:"28px 24px",
      textAlign:"center", marginBottom:48,
      maxWidth:560, margin:"0 auto 48px",
    }}>
      <div style={{
        display:"inline-flex",alignItems:"center",gap:6,
        background:"rgba(255,68,68,0.1)",border:"1px solid rgba(255,68,68,0.2)",
        borderRadius:99,padding:"4px 12px",fontSize:11,color:"#ff4444",
        fontWeight:700,marginBottom:14,letterSpacing:0.5,
      }}>
        <span style={{width:6,height:6,borderRadius:"50%",background:"#ff4444",display:"inline-block",animation:"pulse 1.5s ease infinite"}}/>
        LIVE — STREAMLINING NOW
      </div>
      <h2 style={{fontSize:20,fontWeight:800,marginBottom:8,color:"#fff"}}>
        We're live and getting better every day
      </h2>
      <p style={{color:"#555",fontSize:14,lineHeight:1.7,marginBottom:20}}>
        Inspired by the GoFundMe situation. We're adding bank account payouts so recipients never need a crypto wallet. Drop your email to get notified when it's ready.
      </p>
      {!done ? (
        <div>
          <div style={{display:"flex",gap:8,maxWidth:400,margin:"0 auto"}}>
            <input
              type="email" placeholder="your@email.com"
              value={email} onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&join()}
              style={{...inp,flex:1,fontSize:14}}
            />
            <button onClick={join} style={primaryBtn({width:"auto",padding:"13px 20px",fontSize:14,flexShrink:0})}>
              Notify Me
            </button>
          </div>
          {err&&<div style={{color:"#ff4444",fontSize:12,marginTop:8}}>{err}</div>}
          <div style={{fontSize:11,color:"#2a2a3a",marginTop:8}}>No spam. One email when bank payouts go live.</div>
        </div>
      ) : (
        <div style={{
          background:"rgba(34,204,136,0.08)",border:"1px solid rgba(34,204,136,0.2)",
          borderRadius:10,padding:"12px 16px",display:"inline-flex",alignItems:"center",gap:8,
        }}>
          <span style={{color:"#22cc88",fontSize:16}}>✓</span>
          <span style={{color:"#22cc88",fontSize:13,fontWeight:600}}>You're on the list! We'll email you when ready.</span>
        </div>
      )}
    </div>
  );
}

// ─── Verify Badge ─────────────────────────────────────────────────────────────
function VerifyBadge({level,socialHandle,onClick}) {
  const v=VERIFY[level]||VERIFY.none;
  if(!v.label) return null;
  return (
    <span onClick={onClick} title={v.desc} style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:99,cursor:onClick?"pointer":"default",border:`1px solid ${v.color}`,color:v.color,background:`${v.color}15`,textTransform:"uppercase",letterSpacing:0.8}}>
      {v.badge} {v.label}{socialHandle&&` · @${socialHandle}`}
    </span>
  );
}

// ─── Verify Info Modal ────────────────────────────────────────────────────────
function VerifyInfoModal({campaign,onClose}) {
  const v=VERIFY[campaign.verifyLevel]||VERIFY.none;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3000,padding:16,backdropFilter:"blur(8px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...cardStyle,width:"100%",maxWidth:400,overflow:"hidden"}} className="fade-in">
        <div style={{padding:"18px 22px",borderBottom:"1px solid #111",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h3 style={{margin:0,fontSize:16,fontWeight:800}}>Campaign Verification</h3>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#444",fontSize:22}}>×</button>
        </div>
        <div style={{padding:22}}>
          <div style={{background:`${(v.color||"#555")}10`,border:`1px solid ${(v.color||"#555")}30`,borderRadius:12,padding:16,marginBottom:16,textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:8}}>{v.badge||"?"}</div>
            <div style={{fontWeight:800,color:v.color||"#555",fontSize:14,marginBottom:4}}>{v.label||"Unverified"}</div>
            <div style={{color:"#555",fontSize:12,lineHeight:1.6}}>{v.desc||"This campaign has not been verified."}</div>
          </div>
          {campaign.socialHandle&&(
            <div style={{background:"#0d0d15",border:"1px solid #1e1e2e",borderRadius:10,padding:"12px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
              <div>
                <div style={{fontWeight:700,color:"#fff",fontSize:13}}>@{campaign.socialHandle}</div>
                <div style={{color:"#444",fontSize:11,marginTop:2}}>on {campaign.socialPlatform}</div>
              </div>
              {campaign.socialProofUrl&&<a href={campaign.socialProofUrl} target="_blank" rel="noopener noreferrer" style={{marginLeft:"auto",fontSize:11,color:"#ff4444",fontWeight:600,textDecoration:"none"}}>View proof →</a>}
            </div>
          )}
          <div style={{background:"#0a0a12",borderRadius:10,padding:12}}>
            <div style={{fontSize:11,color:"#444",lineHeight:1.7}}>⚠️ Verification confirms identity only — not campaign claims. Always do your own research before donating.</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Verify Request Modal ─────────────────────────────────────────────────────
function VerifyRequestModal({onClose}) {
  const [platform,setPlatform]=useState("twitter");
  const [handle,setHandle]=useState("");
  const [proofUrl,setProofUrl]=useState("");
  const [campaignId,setCampaignId]=useState("");
  const [sent,setSent]=useState(false);
  const submit=()=>{
    if(!handle||!proofUrl||!campaignId) return;
    const sub=`FundOff Verification Request — @${handle} on ${platform}`;
    const body=`Campaign ID: ${campaignId}\nPlatform: ${platform}\nHandle: @${handle}\nProof URL: ${proofUrl}\nSent: ${new Date().toISOString()}`;
    window.location.href=`mailto:hello@fundoff.org?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
    setSent(true);
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3000,padding:16,backdropFilter:"blur(8px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...cardStyle,width:"100%",maxWidth:440,overflow:"hidden",maxHeight:"92vh",overflowY:"auto"}} className="fade-in">
        <div style={{padding:"18px 22px",borderBottom:"1px solid #111",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><h3 style={{margin:0,fontSize:16,fontWeight:800}}>Get Verified</h3><div style={{fontSize:11,color:"#555",marginTop:3}}>Build donor trust with a verified badge</div></div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#444",fontSize:22}}>×</button>
        </div>
        {!sent?(
          <div style={{padding:22,display:"flex",flexDirection:"column",gap:14}}>
            {[{level:"social",icon:"✓",title:"Social Verified — Free",desc:"Link your Twitter, YouTube, or Instagram"},{level:"id",icon:"🛡",title:"ID Verified — $4.99",desc:"Government ID check via Stripe Identity"},{level:"manual",icon:"⭐",title:"FundOff Verified — High-profile only",desc:"Manual review for notable campaigns"}].map(t=>(
              <div key={t.level} style={{background:"#0d0d15",border:`1px solid ${VERIFY[t.level].color}22`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
                <span style={{fontSize:18,flexShrink:0}}>{t.icon}</span>
                <div><div style={{fontSize:12,fontWeight:700,color:VERIFY[t.level].color}}>{t.title}</div><div style={{fontSize:11,color:"#555",marginTop:2}}>{t.desc}</div></div>
              </div>
            ))}
            <div>
              <label style={{display:"block",color:"#555",fontSize:11,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6,fontWeight:600}}>Campaign ID</label>
              <input value={campaignId} onChange={e=>setCampaignId(e.target.value)} placeholder="Found in your campaign URL" style={inp}/>
            </div>
            <div>
              <label style={{display:"block",color:"#555",fontSize:11,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6,fontWeight:600}}>Platform</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
                {["twitter","youtube","instagram","facebook"].map(p=>(
                  <button key={p} onClick={()=>setPlatform(p)} style={{padding:"8px 4px",borderRadius:9,cursor:"pointer",fontSize:11,fontWeight:600,border:platform===p?"2px solid #ff4444":"1px solid #1e1e2e",background:platform===p?"rgba(255,68,68,0.1)":"#0d0d15",color:platform===p?"#ff4444":"#555",textTransform:"capitalize"}}>{p}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={{display:"block",color:"#555",fontSize:11,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6,fontWeight:600}}>Your @Handle</label>
              <div style={{position:"relative"}}><span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#444",fontSize:15}}>@</span><input value={handle} onChange={e=>setHandle(e.target.value)} placeholder="yourhandle" style={{...inp,paddingLeft:28}}/></div>
            </div>
            <div>
              <label style={{display:"block",color:"#555",fontSize:11,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6,fontWeight:600}}>Proof URL</label>
              <input value={proofUrl} onChange={e=>setProofUrl(e.target.value)} placeholder="Link to your post mentioning this campaign" style={inp}/>
              <div style={{fontSize:10,color:"#2a2a3a",marginTop:4}}>Post: "My official FundOff campaign: fundoff.org" then paste the link</div>
            </div>
            <button onClick={submit} disabled={!handle||!proofUrl||!campaignId} style={primaryBtn({opacity:(!handle||!proofUrl||!campaignId)?0.4:1,cursor:(!handle||!proofUrl||!campaignId)?"not-allowed":"pointer"})}>Submit Request</button>
            <div style={{fontSize:11,color:"#2a2a3a",textAlign:"center"}}>Reviewed within 24 hours. Free for social verification.</div>
          </div>
        ):(
          <div style={{padding:40,textAlign:"center"}} className="fade-in">
            <div style={{fontSize:44,marginBottom:16}}>✓</div>
            <h3 style={{color:"#fff",marginBottom:8,fontWeight:800}}>Request sent!</h3>
            <p style={{color:"#555",fontSize:13,lineHeight:1.6,marginBottom:20}}>We'll add your badge within 24 hours.</p>
            <button onClick={onClose} style={ghostBtn()}>Close</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── TierBadge ────────────────────────────────────────────────────────────────
function TierBadge({tier}) {
  const t=TIERS[tier]||TIERS.Free;
  return <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:99,border:`1px solid ${t.border}`,color:t.color,background:t.bg,textTransform:"uppercase",letterSpacing:0.8}}>{t.label}</span>;
}

// ─── Terms Banner ─────────────────────────────────────────────────────────────
function TermsBanner({onAccept,onViewTos}) {
  return (
    <div className="slide-up" style={{position:"fixed",bottom:0,left:0,right:0,zIndex:5000,background:"#111118",borderTop:"1px solid #1e1e2e",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,boxShadow:"0 -8px 32px rgba(0,0,0,0.6)"}}>
      <div style={{flex:1,minWidth:260,fontSize:13,color:"#aaa",lineHeight:1.6}}>
        By using FundOff you agree to our <span onClick={onViewTos} style={{color:"#ff4444",cursor:"pointer",textDecoration:"underline",fontWeight:600}}>Terms of Service</span> and <a href="/privacy.html" style={{color:"#ff4444",textDecoration:"underline",fontWeight:600}}>Privacy Policy</a>. Campaigns are on-chain and cannot be reversed.
      </div>
      <div style={{display:"flex",gap:10,flexShrink:0}}>
        <button onClick={onViewTos} style={ghostBtn({padding:"10px 18px",fontSize:13})}>Read Terms</button>
        <button onClick={onAccept} style={primaryBtn({width:"auto",padding:"10px 22px",fontSize:13})}>I Agree</button>
      </div>
    </div>
  );
}

// ─── ToS Modal ────────────────────────────────────────────────────────────────
function TosModal({onClose,onAccept,showAcceptBtn}) {
  const sections=[
    {t:"1. Acceptance",b:"By using FundOff you agree to these Terms. If you do not agree, do not use this platform."},
    {t:"2. What FundOff Is",b:"FundOff is a decentralized donation platform on Base blockchain. FundOff never holds donated funds. All transactions go directly between donors and recipients via smart contracts."},
    {t:"3. Prohibited Campaigns",b:"Prohibited:\n• Campaigns funding violence, terrorism, or harm\n• Child exploitation in any form\n• Illegal weapons\n• Fraud or deception\n• Hate speech or harassment\n• Any violation of applicable law"},
    {t:"4. Creator Responsibility",b:"Campaign creators take full legal responsibility for their campaign. FundOff is not liable for creator actions or fund usage."},
    {t:"5. No Pre-Approval",b:"Campaigns go live immediately. No approval required. FundOff reserves the right to remove campaigns from the frontend that violate these Terms."},
    {t:"6. Verification",b:"Verification confirms identity only — not campaign legitimacy. Always do your own research before donating."},
    {t:"7. Irreversible Transactions",b:"All donations are on-chain and cannot be reversed, refunded, or redirected by FundOff."},
    {t:"8. Fees",b:"2% Free, 1% Pro, 0.5% Elite. Deducted automatically at the contract level."},
    {t:"9. Limitation of Liability",b:"FundOff and its operators are not liable for any damages. Use at your own risk."},
    {t:"10. Governing Law",b:"Wyoming, United States."},
    {t:"11. Contact",b:`Violations: ${REPORT_EMAIL}\nOther: hello@fundoff.org`},
  ];
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:4000,padding:16,backdropFilter:"blur(8px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...cardStyle,width:"100%",maxWidth:640,maxHeight:"88vh",overflow:"hidden",display:"flex",flexDirection:"column"}} className="fade-in">
        <div style={{padding:"18px 24px",borderBottom:"1px solid #111",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <h2 style={{margin:0,fontSize:18,fontWeight:800}}>Terms of Service</h2>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#444",fontSize:22}}>×</button>
        </div>
        <div style={{padding:24,overflowY:"auto",fontSize:13,color:"#777",lineHeight:1.8}}>
          <p style={{color:"#aaa",marginBottom:20,fontSize:11}}>Last updated: June 2026 · FundOff</p>
          {sections.map(s=>(<div key={s.t} style={{marginBottom:22}}><h3 style={{color:"#fff",fontSize:14,fontWeight:700,marginBottom:7}}>{s.t}</h3><p style={{whiteSpace:"pre-line"}}>{s.b}</p></div>))}
        </div>
        <div style={{padding:"16px 24px",borderTop:"1px solid #111",flexShrink:0}}>
          {showAcceptBtn
            ?<button onClick={()=>{onAccept&&onAccept();onClose();}} style={primaryBtn({padding:"12px"})}>I Agree — Close</button>
            :<button onClick={onClose} style={primaryBtn({padding:"12px"})}>Close</button>}
        </div>
      </div>
    </div>
  );
}

// ─── Report Modal ─────────────────────────────────────────────────────────────
function ReportModal({campaign,onClose}) {
  const [reason,setReason]=useState("");
  const [details,setDetails]=useState("");
  const [sent,setSent]=useState(false);
  const reasons=["Fraud or scam","Violent or harmful content","Terrorism or extremism","Child exploitation","Harassment or hate speech","Misleading information","Other ToS violation"];
  const submit=()=>{
    if(!reason) return;
    const sub=`FundOff Report — #${campaign.id}: ${campaign.title}`;
    const body=`Campaign: ${campaign.id}\nTitle: ${campaign.title}\nReason: ${reason}\nDetails: ${details}\nDate: ${new Date().toISOString()}`;
    window.location.href=`mailto:${REPORT_EMAIL}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
    setSent(true);
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:16,backdropFilter:"blur(8px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...cardStyle,width:"100%",maxWidth:420,overflow:"hidden"}} className="fade-in">
        <div style={{padding:"18px 22px",borderBottom:"1px solid #111",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:10,color:"#ff4444",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Report Campaign</div><div style={{fontSize:14,fontWeight:700,color:"#fff",maxWidth:300,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{campaign.title}</div></div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#444",fontSize:22}}>×</button>
        </div>
        {!sent?(
          <div style={{padding:22,display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:12,color:"#555",fontWeight:500}}>Select reason</div>

        )}
      </div>
    </div>
  );
}

// ─── Donate Modal ─────────────────────────────────────────────────────────────
function DonateModal({campaign,onClose,onShowTos}) {
  const [step,setStep]=useState(1);
  const [amount,setAmount]=useState("");
  const [message,setMessage]=useState("");
  const [method,setMethod]=useState("card");
  const [email,setEmail]=useState("");
  const [cardN,setCardN]=useState("");
  const [exp,setExp]=useState("");
  const [cvv,setCvv]=useState("");
  const [agreed,setAgreed]=useState(false);
  const [processing,setProcessing]=useState(false);
  const [err,setErr]=useState("");

  const feeNum=parseFloat(TIERS[campaign.tier]?.fee||"2%")/100;
  const amtNum=parseFloat(amount)||0;
  const feeAmt=+(amtNum*feeNum).toFixed(2);
  const recv=+(amtNum-feeAmt).toFixed(2);
  const fmtCard=v=>v.replace(/\D/g,"").slice(0,16).replace(/(.{4})/g,"$1 ").trim();
  const fmtExp=v=>{const c=v.replace(/\D/g,"").slice(0,4);return c.length>=2?`${c.slice(0,2)}/${c.slice(2)}`:c;};

  const next=()=>{
    if(!amount||parseFloat(amount)<20){setErr("Minimum $20");return;}
    if(!agreed){setErr("Please agree to Terms of Service");return;}
    setErr("");setStep(2);
  };
  const pay=async()=>{
    if(method==="card"&&(!email||!cardN||!exp||!cvv)){setErr("Please fill in all fields");return;}
    setErr("");setProcessing(true);
    try {
      const amountCents = Math.round(amtNum * 100);
      // Create payment intent via Netlify function
      const res = await fetch('/api/create-payment-intent', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          amount: amountCents,
          campaignId: campaign.id,
          campaignTitle: campaign.title,
          message,
        }),
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error||'Payment failed');

      // Confirm card payment with Stripe
      const elements = stripe.elements();
      const cardElement = elements.create('card', {
        style:{base:{color:'#fff',fontFamily:'Inter,sans-serif',fontSize:'15px','::placeholder':{color:'#333'}}},
      });

      const {error, paymentIntent} = await getStripe().confirmCardPayment(data.clientSecret, {
        payment_method:{
          card: cardElement,
          billing_details:{email},
        },
      });

      if(error) throw new Error(error.message);
      setProcessing(false);setStep(3);
    } catch(e) {
      setErr(e.message||'Payment failed. Please try again.');
      setProcessing(false);
    }
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16,backdropFilter:"blur(8px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...cardStyle,width:"100%",maxWidth:420,overflow:"hidden",maxHeight:"92vh",overflowY:"auto"}} className="fade-in">
        <div style={{padding:"18px 22px",borderBottom:"1px solid #111",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"#111118",zIndex:1}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,color:"#ff4444",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>Donating to</div>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{campaign.title}</div>
            {campaign.verifyLevel&&campaign.verifyLevel!=="none"&&<div style={{marginTop:6}}><VerifyBadge level={campaign.verifyLevel} socialHandle={campaign.socialHandle}/></div>}
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#444",fontSize:22,marginLeft:12}}>×</button>
        </div>
        {step===1&&(
          <div style={{padding:22}}>
            <div style={{fontSize:12,color:"#555",marginBottom:10,fontWeight:500}}>Choose amount</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
              {[20,50,100,250].map(p=>(<button key={p} onClick={()=>setAmount(String(p))} style={{padding:"10px 0",borderRadius:10,cursor:"pointer",fontWeight:700,fontSize:14,border:amount===String(p)?"2px solid #ff4444":"1px solid #1e1e2e",background:amount===String(p)?"rgba(255,68,68,0.1)":"#0d0d15",color:amount===String(p)?"#ff4444":"#555"}}>${p}</button>))}
            </div>
            <div style={{position:"relative",marginBottom:6}}>
              <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:"#444",fontSize:17,fontWeight:600}}>$</span>
              <input type="number" placeholder="Other amount" value={amount} onChange={e=>setAmount(e.target.value)} min="20" style={{...inp,paddingLeft:28}}/>
            </div>
            <div style={{fontSize:11,color:"#2a2a3a",marginBottom:14}}>Minimum $20 · No maximum · {TIERS[campaign.tier]?.fee||"2%"} fee</div>

            </div>
            <div style={{display:"flex",gap:8,marginBottom:18}}>
              {[["card","💳 Card"],["apple","🍎 Apple Pay"],["crypto","⟠ Crypto"]].map(([id,label])=>(<button key={id} onClick={()=>setMethod(id)} style={{flex:1,padding:"9px 4px",borderRadius:10,cursor:"pointer",fontWeight:600,fontSize:11,border:method===id?"2px solid #ff4444":"1px solid #1e1e2e",background:method===id?"rgba(255,68,68,0.1)":"#0d0d15",color:method===id?"#ff4444":"#555"}}>{label}</button>))}
            </div>
            {method==="card"&&(<div style={{display:"flex",flexDirection:"column",gap:10}}><input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={inp}/><input placeholder="Card number" value={cardN} onChange={e=>setCardN(fmtCard(e.target.value))} maxLength={19} style={inp}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><input placeholder="MM/YY" value={exp} onChange={e=>setExp(fmtExp(e.target.value))} maxLength={5} style={inp}/><input placeholder="CVV" value={cvv} onChange={e=>setCvv(e.target.value.replace(/\D/g,"").slice(0,4))} style={inp}/></div></div>)}
            {method==="apple"&&(<div style={{background:"#000",borderRadius:12,padding:28,textAlign:"center",border:"1px solid #111"}}><div style={{fontSize:40,marginBottom:8}}>🍎</div><div style={{color:"#fff",fontWeight:700}}>Apple Pay</div><div style={{color:"#444",fontSize:12,marginTop:4}}>Use Face ID or Touch ID</div></div>)}
            {method==="crypto"&&(<div style={{display:"flex",flexDirection:"column",gap:8}}>{[["🦊","MetaMask"],["🔵","Coinbase Wallet"],["🔗","WalletConnect"]].map(([icon,name])=>(<button key={name} style={{padding:"13px 16px",borderRadius:10,cursor:"pointer",border:"1px solid #1e1e2e",background:"#0d0d15",color:"#fff",fontSize:14,textAlign:"left",display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:24}}>{icon}</span>{name}</button>))}</div>)}
            {err&&<div style={{color:"#ff4444",fontSize:12,marginTop:10}}>{err}</div>}
            <button onClick={pay} disabled={processing} style={primaryBtn({marginTop:16,background:processing?"#1a1a1a":"linear-gradient(90deg,#ff4444,#ff8800)",cursor:processing?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:processing?0.7:1})}>
              {processing?<><span style={{display:"inline-block",width:16,height:16,border:"2px solid rgba(255,255,255,0.2)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>Processing...</>:`Donate $${amtNum.toFixed(2)}`}
            </button>
            <button onClick={()=>setStep(1)} style={{width:"100%",padding:"10px",marginTop:6,background:"none",border:"none",color:"#333",fontSize:12,cursor:"pointer"}}>← Back</button>
          </div>
        )}
        {step===3&&(
          <div style={{padding:44,textAlign:"center"}} className="fade-in">
            <div style={{width:72,height:72,borderRadius:"50%",margin:"0 auto 20px",background:"rgba(255,68,68,0.08)",border:"2px solid #ff4444",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30}}>✓</div>
            <h2 style={{color:"#fff",margin:"0 0 10px",fontSize:20,fontWeight:800}}>Donation sent!</h2>
            <p style={{color:"#666",fontSize:13,lineHeight:1.7,margin:"0 0 20px"}}><strong style={{color:"#ff4444"}}>${amtNum.toFixed(2)}</strong> is on its way. Instantly. Permanently. No platform can touch it.</p>
            <div style={{background:"#0a0a12",borderRadius:10,padding:"12px 16px",fontSize:11,color:"#333",fontFamily:"monospace",marginBottom:22}}>✓ Confirmed on Base · {CONTRACT.slice(0,16)}...</div>
            <button onClick={onClose} style={ghostBtn({padding:"12px 28px"})}>Close</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Pricing Modal ────────────────────────────────────────────────────────────
function PricingModal({onClose}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16,backdropFilter:"blur(8px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{...cardStyle,width:"100%",maxWidth:600,padding:28,maxHeight:"92vh",overflowY:"auto"}} className="fade-in">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <div><h2 style={{margin:0,fontSize:20,fontWeight:800}}>Campaign Tiers</h2><p style={{color:"#444",fontSize:12,marginTop:4}}>Lower fees. More visibility. Same unstoppable protection.</p></div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#444",fontSize:24}}>×</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
          {Object.entries(TIERS).map(([key,t])=>(<div key={key} style={{border:`1px solid ${t.border}`,borderRadius:14,padding:18,background:t.bg,display:"flex",flexDirection:"column"}}><div style={{fontSize:11,fontWeight:700,color:t.color,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{t.label}</div><div style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:2}}>{t.price}</div><div style={{fontSize:12,color:"#444",marginBottom:16}}>{t.fee} donation fee</div><div style={{flex:1,display:"flex",flexDirection:"column",gap:7}}>{t.perks.map(p=>(<div key={p} style={{fontSize:12,color:"#777",display:"flex",gap:6}}><span style={{color:t.color,flexShrink:0}}>✓</span>{p}</div>))}</div></div>))}
        </div>
        <div style={{marginTop:20,padding:"14px 16px",background:"rgba(255,68,68,0.04)",border:"1px solid rgba(255,68,68,0.08)",borderRadius:10,fontSize:12,color:"#444",textAlign:"center"}}>All tiers: blockchain protected · uncensorable · Social/ID/FundOff verification available</div>
      </div>
    </div>
  );
}

// ─── Campaign Card ────────────────────────────────────────────────────────────
function CampaignCard({c,onDonate,onReport}) {
  const [hov,setHov]=useState(false);
  const [menu,setMenu]=useState(false);
  const [showVerify,setShowVerify]=useState(false);
  const p=pct(c.totalRaisedUSDC,c.goalUSDC);
  const isElite=c.tier==="Elite";
  const hasVerify=c.verifyLevel&&c.verifyLevel!=="none";
  return (
    <>
      <div style={{...cardStyle,position:"relative",overflow:"hidden",border:`1px solid ${hov?(isElite?"#ff8800":"#ff4444"):(isElite?"rgba(255,136,0,0.2)":"#1a1a28")}`,transform:hov?"translateY(-3px)":"translateY(0)",transition:"all 0.2s",cursor:"pointer"}} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>{setHov(false);setMenu(false);}}>
        {isElite&&<div style={{position:"absolute",top:12,right:44,zIndex:2,background:"linear-gradient(90deg,#ff8800,#ffcc00)",color:"#000",fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:99}}>⭐ FEATURED</div>}
        <button onClick={e=>{e.stopPropagation();setMenu(!menu);}} style={{position:"absolute",top:12,right:12,zIndex:3,background:"rgba(0,0,0,0.6)",border:"1px solid #222",borderRadius:6,padding:"4px 8px",cursor:"pointer",color:"#555",fontSize:12}}>⚑</button>
        {menu&&(<div style={{position:"absolute",top:42,right:12,zIndex:4,background:"#111118",border:"1px solid #222",borderRadius:10,padding:6,minWidth:160,boxShadow:"0 8px 24px rgba(0,0,0,0.7)"}}><button onClick={e=>{e.stopPropagation();onReport(c);setMenu(false);}} style={{display:"block",width:"100%",textAlign:"left",padding:"8px 10px",borderRadius:7,border:"none",background:"none",color:"#ff4444",fontSize:12,cursor:"pointer",fontWeight:600}}>🚩 Report this campaign</button></div>)}
        <div onClick={()=>onDonate(c)}>
          <div style={{height:130,background:isElite?"linear-gradient(135deg,#1a0d00,#2a1500)":"linear-gradient(135deg,#0d0d1a,#111128)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:44,opacity:0.35}}>🛡</div>
          <div style={{padding:18}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10,flexWrap:"wrap"}}>
              <TierBadge tier={c.tier}/>
              {hasVerify&&<VerifyBadge level={c.verifyLevel} socialHandle={c.socialHandle} onClick={e=>{e.stopPropagation();setShowVerify(true);}}/>}
              <span style={{fontSize:11,color:"#2a2a3a",marginLeft:"auto"}}>{ago(c.createdAt)}</span>
            </div>
            <h3 style={{margin:"0 0 8px",fontSize:15,fontWeight:700,color:"#fff",lineHeight:1.4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{c.title}</h3>
            <p style={{margin:"0 0 14px",fontSize:12,color:"#555",lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{c.description}</p>
            <div style={{background:"#111",borderRadius:99,height:5,marginBottom:10,overflow:"hidden"}}><div style={{width:`${p}%`,height:"100%",background:isElite?"linear-gradient(90deg,#ff8800,#ffcc00)":"linear-gradient(90deg,#ff4444,#ff8800)",borderRadius:99}}/></div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
              <div><span style={{color:isElite?"#ff8800":"#ff4444",fontWeight:800,fontSize:18}}>{fmt(c.totalRaisedUSDC)}</span><span style={{color:"#2a2a3a",fontSize:12}}> of {fmt(c.goalUSDC)}</span></div>
              <span style={{color:"#333",fontSize:11}}>{c.donationCount.toLocaleString()} donors</span>
            </div>
            <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #0f0f18",fontSize:10,color:"#1e1e2e",display:"flex",alignItems:"center",gap:4}}>
              🔒 On-chain · Uncensorable · {TIERS[c.tier]?.fee||"2%"} fee
            </div>
          </div>
        </div>
      </div>
      {showVerify&&<VerifyInfoModal campaign={c} onClose={()=>setShowVerify(false)}/>}
    </>
  );
}

// ─── Empty State ──────────────────────────────────────────────────────────────
function EmptyState({onStart}) {
  return (
    <div style={{textAlign:"center",padding:"40px 24px",maxWidth:480,margin:"0 auto"}}>
      <div style={{fontSize:64,marginBottom:20,opacity:0.2}}>🛡</div>
      <h3 style={{color:"#fff",fontSize:22,fontWeight:800,marginBottom:12}}>No campaigns yet</h3>
      <p style={{color:"#444",fontSize:14,lineHeight:1.8,marginBottom:28}}>Be the first to launch a campaign on FundOff.<br/>Uncensorable. Instant payments. No approval needed.</p>
      <button onClick={onStart} style={primaryBtn({width:"auto",padding:"14px 30px",fontSize:14})}>🚀 Start the first campaign</button>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [campaigns,setCampaigns]=useState([]);
  const [donating,setDonating]=useState(null);
  const [reporting,setReporting]=useState(null);
  const [showCreate,setShowCreate]=useState(false);
  const [showPricing,setShowPricing]=useState(false);
  const [showTos,setShowTos]=useState(false);
  const [showVerifyReq,setShowVerifyReq]=useState(false);
  const [showBanner,setShowBanner]=useState(false);
  const [tosFromBanner,setTosFromBanner]=useState(false);

  useEffect(()=>{ if(!localStorage.getItem(TERMS_KEY)) setShowBanner(true); },[]);
  const acceptTerms=()=>{ localStorage.setItem(TERMS_KEY,"true"); setShowBanner(false); };

  const visible=campaigns.filter(c=>c.active&&!c.hidden);
  const featured=visible.filter(c=>c.featuredHomepage);
  const regular=visible.filter(c=>!c.featuredHomepage);
  const totalRaised=visible.reduce((s,c)=>s+c.totalRaisedUSDC,0);
  const totalDonors=visible.reduce((s,c)=>s+c.donationCount,0);

  return (
    <div style={{minHeight:"100vh",background:"#09090f",paddingBottom:showBanner?80:0}}>

      {/* Nav */}
      <nav style={{borderBottom:"1px solid #0f0f18",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,position:"sticky",top:0,zIndex:100,background:"rgba(9,9,15,0.97)",backdropFilter:"blur(16px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {/* Logo mark — F with red dot */}
          <svg width="34" height="34" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="34" cy="34" r="34" fill="#0d0d14"/>
            <circle cx="34" cy="34" r="32" fill="none" stroke="#1e1e2e" strokeWidth="1"/>
            {/* F stem */}
            <rect x="17" y="14" width="7" height="40" rx="2" fill="white"/>
            {/* F top bar */}
            <rect x="17" y="14" width="28" height="7" rx="2" fill="white"/>
            {/* F middle bar */}
            <rect x="17" y="27" width="20" height="6" rx="2" fill="white"/>
            {/* Red dot */}
            <circle cx="51" cy="30" r="6" fill="#ff4444"/>
          </svg>
          <span style={{fontWeight:900,fontSize:19,letterSpacing:-0.5}}>Fund<span style={{color:"#ff4444"}}>Off</span></span>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setShowVerifyReq(true)} style={ghostBtn({padding:"7px 14px",fontSize:12,fontWeight:600,color:"#4488ff",borderColor:"rgba(68,136,255,0.3)"})}>✓ Get Verified</button>
          <button onClick={()=>setShowPricing(true)} style={ghostBtn({padding:"7px 14px",fontSize:12,fontWeight:600})}>Pricing</button>
          <button onClick={()=>{setTosFromBanner(false);setShowTos(true);}} style={ghostBtn({padding:"7px 14px",fontSize:12,fontWeight:600})}>Terms</button>
          <button onClick={()=>setShowCreate(true)} style={{padding:"8px 16px",borderRadius:9,border:"none",background:"linear-gradient(90deg,#ff4444,#ff8800)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>+ Start Campaign</button>
        </div>
      </nav>

      {/* Hero */}
      <div style={{padding:"60px 24px 0",textAlign:"center",maxWidth:680,margin:"0 auto"}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(255,68,68,0.06)",border:"1px solid rgba(255,68,68,0.15)",borderRadius:99,padding:"5px 14px",fontSize:11,color:"#ff4444",fontWeight:700,marginBottom:24,letterSpacing:0.5}}>🔒 No judge can take this down</div>
        <h1 style={{fontSize:"clamp(30px,6vw,52px)",fontWeight:900,lineHeight:1.08,margin:"0 0 16px",letterSpacing:-1.5}}>
          The donation platform<br/>
          <span style={{background:"linear-gradient(90deg,#ff4444,#ff8800)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>that can't be bullied.</span>
        </h1>
        <p style={{fontSize:16,color:"#555",lineHeight:1.7,margin:"0 0 32px",maxWidth:520,marginLeft:"auto",marginRight:"auto"}}>
          GoFundMe took down $454,000 overnight because a judge said so. On FundOff, that's impossible. Campaigns live on the blockchain. Funds go directly to recipients. No court order changes that.
        </p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,maxWidth:380,margin:"0 auto 32px"}}>
          {[{label:"Total Raised",val:totalRaised>0?fmt(totalRaised):"$0"},{label:"Total Donors",val:totalDonors>0?totalDonors.toLocaleString():"0"},{label:"Campaigns",val:visible.length}].map(s=>(<div key={s.label} style={{...cardStyle,padding:"16px 10px"}}><div style={{fontSize:22,fontWeight:800,color:"#ff4444"}}>{s.val}</div><div style={{fontSize:10,color:"#2a2a3a",marginTop:3,fontWeight:500}}>{s.label}</div></div>))}
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:48}}>
          <button onClick={()=>setShowCreate(true)} style={primaryBtn({width:"auto",padding:"13px 26px",fontSize:14})}>🚀 Start a Campaign</button>
          <button onClick={()=>setShowPricing(true)} style={ghostBtn({padding:"13px 26px"})}>View Pricing</button>
        </div>
      </div>

      {/* Waitlist Banner */}
      <div style={{maxWidth:680,margin:"0 auto",padding:"0 24px"}}>
        <WaitlistBanner/>
      </div>

      {/* Featured */}
      {featured.length>0&&(
        <div style={{maxWidth:1100,margin:"0 auto",padding:"0 24px 40px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
            <span style={{fontSize:12,fontWeight:800,color:"#ff8800",letterSpacing:0.5}}>⭐ FEATURED CAMPAIGNS</span>
            <span style={{fontSize:10,background:"rgba(255,136,0,0.08)",border:"1px solid rgba(255,136,0,0.15)",color:"#ff8800",padding:"2px 8px",borderRadius:99}}>Elite Tier</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:18}}>
            {featured.map(c=><CampaignCard key={c.id} c={c} onDonate={setDonating} onReport={setReporting}/>)}
          </div>
        </div>
      )}

      {/* Campaigns */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"0 24px 80px"}}>
        {visible.length>0?(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <span style={{fontSize:16,fontWeight:800}}>All Campaigns</span>
              <span style={{fontSize:12,color:"#2a2a3a"}}>{visible.length} active</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:18}}>
              {regular.map(c=><CampaignCard key={c.id} c={c} onDonate={setDonating} onReport={setReporting}/>)}
            </div>
          </>
        ):(
          <EmptyState onStart={()=>setShowCreate(true)}/>
        )}
      </div>

      {/* Footer */}
      <div style={{borderTop:"1px solid #0d0d15",padding:"28px 24px",textAlign:"center"}}>
        <div style={{fontSize:12,color:"#2a2a3a",marginBottom:8}}>
          <span style={{color:"#ff4444",fontWeight:700,fontSize:14}}>FundOff</span>
          {" · "}<span style={{cursor:"pointer",color:"#333"}} onClick={()=>{setTosFromBanner(false);setShowTos(true);}}>Terms</span>
          {" · "}<a href="/privacy.html" style={{color:"#333",textDecoration:"none"}}>Privacy</a>
          {" · "}<span style={{cursor:"pointer",color:"#333"}} onClick={()=>setShowVerifyReq(true)}>Get Verified</span>
          {" · "}<a href={`mailto:${REPORT_EMAIL}`} style={{color:"#333",textDecoration:"none"}}>Report</a>
          {" · "}<a href="mailto:hello@fundoff.org" style={{color:"#333",textDecoration:"none"}}>Contact</a>
        </div>
        <div style={{fontSize:10,color:"#111",fontFamily:"monospace"}}>Contract: {CONTRACT} · FundOff · Wyoming</div>
      </div>

      {showBanner&&<TermsBanner onAccept={acceptTerms} onViewTos={()=>{setTosFromBanner(true);setShowTos(true);}}/>}
      {donating&&<DonateModal campaign={donating} onClose={()=>setDonating(null)} onShowTos={()=>{setTosFromBanner(false);setShowTos(true);}}/>}
      {reporting&&<ReportModal campaign={reporting} onClose={()=>setReporting(null)}/>}
      {showCreate&&<CreateModal onClose={()=>setShowCreate(false)} onCreate={c=>setCampaigns(p=>[c,...p])} onShowTos={()=>{setTosFromBanner(false);setShowTos(true);}}/>}
      {showPricing&&<PricingModal onClose={()=>setShowPricing(false)}/>}
      {showTos&&<TosModal onClose={()=>setShowTos(false)} onAccept={tosFromBanner?acceptTerms:null} showAcceptBtn={tosFromBanner}/>}
      {showVerifyReq&&<VerifyRequestModal onClose={()=>setShowVerifyReq(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
