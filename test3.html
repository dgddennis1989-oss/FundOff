<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Micro Test</title>
  <style>body{background:#09090f;color:white;padding:40px;font-family:sans-serif}.ok{color:#22cc88}.fail{color:#ff4444}.box{background:#111;padding:20px;border-radius:12px;margin-bottom:16px;border:1px solid #333}</style>
</head>
<body>
  <h2>Micro Test - First 50 lines only</h2>
  <div class="box" id="r1">Running...</div>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect } = React;

const CONTRACT = "0x3a6a50a4c7145896BeBe99b731Ccf6Cb0739e752";
const CONTRACT_V2 = "0x4BB819722a8374b61B84B450460FF4205112c873";

const sanitize = str => {
  if(!str) return "";
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#x27;")
    .replace(/[/]/g,"&#x2F;")
    .slice(0, 5000);
};

const VERIFY = {
  none: { label:null, badge:null, color:null, desc:null },
  social: { label:"Social Verified", badge:"V", color:"#4488ff", desc:"Identity confirmed via linked social media account" },
};

const TIERS = {
  Free: { label:"Free", price:"$0/mo", fee:"2%", color:"#555", perks:["Instant launch","2% donation fee"] },
  Pro: { label:"Pro", price:"$9.99/mo", fee:"1%", color:"#4488ff", perks:["Featured badge","1% donation fee"] },
};

const fmt = u => {
  const n = u / 1e6;
  if(n >= 1e6) return "$" + (n/1e6).toFixed(1) + "M";
  if(n >= 1000) return "$" + (n/1000).toFixed(0) + "k";
  return "$" + n.toFixed(0);
};

function TestApp() {
  return <div className="box"><span className="ok">Micro test compiled OK</span></div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<TestApp/>);
document.getElementById("r1").innerHTML = "<span class=ok>All good - no errors in first 50 lines</span>";
  </script>
</body>
</html>
